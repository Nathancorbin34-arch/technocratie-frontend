<div class="connexion-page">

  <div class="connexion-container">

    <div class="connexion-logo">
      <span class="logo-tc">TC</span>
      <span class="logo-nom">TECHNOCRATIE</span>
    </div>

    <div class="tabs">
      <button class="tab" [class.active]="mode === 'connexion'" (click)="mode = 'connexion'">
        Connexion
      </button>
      <button class="tab" [class.active]="mode === 'inscription'" (click)="mode = 'inscription'">
        Créer un compte
      </button>
    </div>

    <div class="form-block" *ngIf="mode === 'connexion'">
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" placeholder="jean@example.com" [(ngModel)]="loginEmail" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" placeholder="••••••••" [(ngModel)]="loginPassword" />
      </div>
      <button class="btn-submit" (click)="seConnecter()">Se connecter</button>
      <p class="form-link">Pas encore de compte ?
        <span (click)="mode = 'inscription'">Créer un compte</span>
      </p>
    </div>

    <div class="form-block" *ngIf="mode === 'inscription'">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" placeholder="Jean" [(ngModel)]="prenom" />
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" placeholder="Dupont" [(ngModel)]="nom" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="jean@example.com" [(ngModel)]="email" />
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" placeholder="06 12 34 56 78" [(ngModel)]="tel" />
      </div>
      <div class="form-group">
        <label>Adresse</label>
        <input type="text" placeholder="12 rue de la Paix" [(ngModel)]="adresse" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Code postal</label>
          <input type="text" placeholder="75001" [(ngModel)]="cp" />
        </div>
        <div class="form-group">
          <label>Ville</label>
          <input type="text" placeholder="Paris" [(ngModel)]="ville" />
        </div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" placeholder="••••••••" [(ngModel)]="password" />
      </div>
      <button class="btn-submit" (click)="sInscrire()">Créer mon compte</button>
      <p class="form-link">Déjà un compte ?
        <span (click)="mode = 'connexion'">Se connecter</span>
      </p>
    </div>

  </div>
</div>
